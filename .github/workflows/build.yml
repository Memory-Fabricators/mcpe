name: build

on:
  push:
  pull_request:

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      BUILD_TYPE: Release
      VCPKG_BUILD_TYPE: release
      VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/.github/vcpkg-triplets
      VCPKG_FORCE_SYSTEM_BINARIES: 1
      VCPKG_USE_SYSTEM_NINJA: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake 4.x
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "4.2.3"

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libpng-dev libopenal-dev git curl \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev libxinerama-dev \
            libxkbcommon-dev libwayland-dev wayland-protocols libegl1-mesa-dev libdrm-dev libgbm-dev libxss-dev libxtst-dev
          if ! sudo apt-get install -y libgles1-mesa-dev; then
            sudo apt-get install -y libgles-dev mesa-common-dev
          fi
          curl -fsSL https://apt.llvm.org/llvm.sh -o /tmp/llvm.sh
          sudo bash /tmp/llvm.sh 21
          echo "CC=clang-21" >> "$GITHUB_ENV"
          echo "CXX=clang++-21" >> "$GITHUB_ENV"

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew update
          brew install pkg-config llvm@21
          echo "CC=$(brew --prefix llvm@21)/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=$(brew --prefix llvm@21)/bin/clang++" >> "$GITHUB_ENV"

      - name: Install dependencies (macOS vcpkg)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg "$RUNNER_TEMP/vcpkg"
          "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.sh"
          if [[ "$(uname -m)" == "arm64" ]]; then
            TRIPLET=arm64-osx-release
          else
            TRIPLET=x64-osx-release
          fi
          export VCPKG_BUILD_TYPE=release
          "$RUNNER_TEMP/vcpkg/vcpkg" install sdl3 libpng openal-soft angle --triplet $TRIPLET
          echo "PKG_CONFIG_PATH=$RUNNER_TEMP/vcpkg/installed/$TRIPLET/lib/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y llvm --version=21.0.0
          choco install -y pkgconfiglite
          choco install -y git
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          git clone https://github.com/microsoft/vcpkg $vcpkgRoot
          & (Join-Path $vcpkgRoot "bootstrap-vcpkg.bat")
          $env:VCPKG_BUILD_TYPE="release"
          & (Join-Path $vcpkgRoot "vcpkg.exe") install sdl3 libpng openal-soft angle --triplet x64-windows-release
          $pkgConfigPath = Join-Path $vcpkgRoot "installed/x64-windows/lib/pkgconfig"
          Add-Content $env:GITHUB_ENV "PKG_CONFIG_PATH=$pkgConfigPath;$env:PKG_CONFIG_PATH"
          Add-Content $env:GITHUB_ENV "VCPKG_ROOT=$vcpkgRoot"
          Add-Content $env:GITHUB_ENV "CC=clang"
          Add-Content $env:GITHUB_ENV "CXX=clang++"

      - name: Build and install SDL3 (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          git clone --depth 1 --branch main https://github.com/libsdl-org/SDL.git "$RUNNER_TEMP/SDL"
          cmake -S "$RUNNER_TEMP/SDL" -B "$RUNNER_TEMP/SDL/build" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$RUNNER_TEMP/SDL3"
          cmake --build "$RUNNER_TEMP/SDL/build"
          cmake --install "$RUNNER_TEMP/SDL/build"
          echo "PKG_CONFIG_PATH=$RUNNER_TEMP/SDL3/lib/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DCMAKE_INSTALL_PREFIX=dist

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE="$env:BUILD_TYPE" `
            -DCMAKE_INSTALL_PREFIX=dist

      - name: Build (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake --build build

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --build build

      - name: Install (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake --install build

      - name: Install (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --install build

      - name: Bundle game + assets + dedicated server (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p package
          cp -R data package/data
          cp dist/bin/mcpe_sdl3 package/
          cp dist/bin/mcpe_dedicated package/

      - name: Bundle game + assets + dedicated server (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item -Recurse data package/data
          Copy-Item dist/bin/mcpe_sdl3.exe package/
          Copy-Item dist/bin/mcpe_dedicated.exe package/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcpe-${{ matrix.os }}
          path: package
